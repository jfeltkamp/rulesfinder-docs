site_name: 'RuFi - The RulesFinder'
nav:
  - 'Home':
      - 'What is RuFi': 'index.md'
      - 'Get RuFi': 'get-rufi/install-rufi.md'
  - 'Start with RuFi':
      - 'Project Planning': 'work_with_rufi/project-plan.md'
      - 'Instructions for usage': 'work_with_rufi/operation-manual.md'
      - 'Proceeding': 'work_with_rufi/get-involved.md'
  - 'Create Content':
      - 'General': 'write_content/general-edit-texts.md'
      - 'Problems': 'write_content/probleme.md'
      - 'Rules': 'write_content/regeln.md'
      - 'Arguments': 'write_content/argumente.md'
      - 'PRO/CON Argumentation': 'write_content/pro-contra-argumentation.md'

docs_dir: docs/en

copyright: "Copyright &copy; 2022-2026 Joachim Feltkamp"
extra:
  alternate:
    - name: English
      link: /en/latest
      lang: en
    - name: Deutsch
      link: /de/latest
      lang: de
theme:
  name: material
  language: en
  logo: img/logo.svg
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
extra_css: [extra.css]
markdown_extensions:
  - admonition
  - footnotes
  - attr_list



